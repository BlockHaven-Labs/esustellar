apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
  namespace: esustellar-monitoring
data:
  alert-rules.yml: |
    groups:
      - name: esustellar-web
        rules:
          - alert: WebAppDown
            expr: probe_success{job="esustellar-web"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Web app /api/health endpoint is failing"
              description: "The web app health check has been returning non-200 for more than 2 minutes."
          - alert: HighErrorRate
            expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High error rate on web app"
              description: "Error rate is above 5% for the last 5 minutes."
      - name: esustellar-deployer-balance
        rules:
          - alert: DeployerBalanceWarning
            expr: deployer_account_balance_threshold_warning == 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Deployer account balance low ({{ $value }} XLM) on {{ $labels.network }}"
              description: "Deployer account {{ $labels.network }} balance is below 500 XLM. Current balance: {{ $value }} XLM. Fund the account to avoid deployment failures."
          - alert: DeployerBalanceCritical
            expr: deployer_account_balance_threshold_critical == 1
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Deployer account balance critically low ({{ $value }} XLM) on {{ $labels.network }}"
              description: "Deployer account {{ $labels.network }} balance is below 100 XLM. Current balance: {{ $value }} XLM. Immediate funding required or contract deployments will fail."
          - alert: DeployerAccountUnreachable
            expr: deployer_account_up == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Deployer account unreachable on {{ $labels.network }}"
              description: "Cannot fetch deployer account balance from Horizon ({{ $labels.network }}). The Horizon endpoint may be down or the account may not exist."
